# Swarm-Doctor flight sheet
# This file is MACHINE-READABLE INSTRUCTIONS for cli/swarm_doctor.py, not just a doc.
# - `thresholds` define pass/fail standards.
# - `weights`   define how categories combine into the stability_score.
# - `observations` carry what was measured (or simulated) for THIS visit.
#
# To triage a different patient: edit `agent` + `observations`. Leave thresholds alone
# unless you are deliberately changing the standard.

agent:
  agent_id: ao-helpdesk-01
  agent_name: AO Help-Desk Support Agent
  host: defendableos-baremetal-02
  symptom: "stopped replying to tickets around 08:10"

# --- Pass/fail standards -----------------------------------------------------
thresholds:
  max_latency_ms: 8000            # slowest acceptable response latency
  max_crash_count: 0              # crashes tolerated in the observation window
  max_error_rate: 0.05            # errors / total_checks
  min_heartbeat_success_rate: 0.95
  min_successful_probe_count: 3   # how many probe requests must succeed
  max_consecutive_failures: 2
  max_gpu_memory_used_pct: 0.90   # used_vram / total_vram
  max_context_tokens_pct: 0.90    # used_context_tokens / max_context_tokens

# --- Stability score weights (must sum to ~1.0) ------------------------------
weights:
  vitals: 0.30
  pulse: 0.25
  bloodwork: 0.20
  neuro: 0.15
  history: 0.10

# --- Observations for THIS visit ---------------------------------------------
# Fill these by hand from the checklist, or let future automation populate them.
# This default block describes a HEALTHY patient (edit to match reality).
observations:
  # Vitals
  vitals_state: alive             # alive | dead | crash_loop | hung | unreachable
  process_up: true
  crash_count: 0
  consecutive_failures: 0

  # Pulse
  total_heartbeats: 20
  successful_heartbeats: 20
  total_probes: 5
  successful_probes: 5
  latency_ms: 1400
  last_response_age_s: 6

  # Bloodwork
  total_checks: 20
  errors: 0
  bloodwork_flags: []             # any of: oom, cuda_error, context_blowout,
                                  #         template_corruption, tool_call_failure
  gpu:
    used_vram_mb: 16000
    total_vram_mb: 24000
  context:
    used_context_tokens: 3200
    max_context_tokens: 8192

  # Neuro
  neuro:
    expected_model: "Atlas-Qwen-27B"
    loaded_model: "Atlas-Qwen-27B"
    expected_adapter: "helpdesk-v3"
    loaded_adapter: "helpdesk-v3"
    sampling_sane: true
    system_prompt_ok: true

  # History
  recent_changes: []              # e.g. ["deploy 08:05", "adapter swap helpdesk-v2->v3"]
